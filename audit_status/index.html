<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Audit Status</title>
        <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

        <!-- MapLibre -->
        <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
        <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

        <!--Base Map Control-->
        <script src="https://unpkg.com/maplibre-basemaps@0.0.6/dist/maplibre-basemaps.js"></script>

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

        <!-- SheetJS -->
        <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

        <!-- Web Awesome -->
        <script src="https://kit.webawesome.com/12f6b474bd1f41e1.js" crossorigin="anonymous"></script>

        <!-- Mapbox Search JS -->
        <script id="search-js" defer="" src="https://api.mapbox.com/search-js/v1.5.0/web.js"></script>

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="map-wrap">

            <div id="side-panel">
                <h2>Meet our <br>Drain Detectives </h2>
                <div id="captain-row" class="team-role-row">
                    <img class="team-icon" src="data/images/team-captain.png" alt="">
                    <div class="team-role-info">
                        <h3>Captains</h3>
                        <h4 class="team-role-desc" id="captain-desc">Citizens who are leading audits in their neighborhood!</h4>
                        <div id="team-captain"></div>
                    </div>
                </div>
                <div id="crew-row" class="team-role-row">
                    <img class="team-icon" src="data/images/team-crew.png" alt="">
                    <div class="team-role-info">
                        <h3>Crew</h3>
                        <h4 class="team-role-desc" id="crew-desc">Citizens who have volunteered in guided and individual audits</h4>
                        <div id="crew-name"></div>
                    </div>
                </div>

                <div id="team-img" style="display:none;"></div>
            </div>

            <div id="map-container"></div>

            <div id="legend">
                <div class="legend-title">SWD Audit Progress</div>
                <hr class="panel-divider" />
                <div class="legend-table">
                    <div class="legend-row legend-header">
                        <span></span>
                        <span>Status</span>
                        <span>km</span>
                    </div>
                    <div class="legend-row">
                        <span class="legend-line" style="background:#7bff00;"></span>
                        <span>Audit Done</span>
                        <span id="legend-km-done">—</span>
                    </div>
                    <div class="legend-row">
                        <span class="legend-line" style="background:#ff47f0;"></span>
                        <span>Audit In Progress</span>
                        <span id="legend-km-inprogress">—</span>
                    </div>
                </div>
            </div>

            <div id="search-container">
                <mapbox-search-box id="search-box"></mapbox-search-box>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
