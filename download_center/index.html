<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Download Centre</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

        <!-- Web Awesome -->
        <script src="https://kit.webawesome.com/12f6b474bd1f41e1.js" crossorigin="anonymous"></script>

        <!-- SheetJS -->
        <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="download-centre">


            <table id="download-table" class="download-table">
                <thead>
                    <tr>
                        <th>Layer</th>
                        <th>Source</th>
                        <th>Download</th>
                    </tr>
                </thead>
                <tbody id="download-table-body">
                    <tr>
                        <td colspan="3" class="loading-row">Loading data…</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <script src="script.js"></script>
        <script>
            function sendHeight() {
                window.parent.postMessage({ iframeHeight: document.documentElement.scrollHeight }, '*');
            }
            window.addEventListener('load', sendHeight);
            window.addEventListener('resize', sendHeight);
            new ResizeObserver(sendHeight).observe(document.body);
        </script>
    </body>
</html>
