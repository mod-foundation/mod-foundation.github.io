<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Audit Status
        </title>
        <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

        <!-- MapLibre -->
        <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
        <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

        <!--Base Map Control-->
        <script src="https://unpkg.com/maplibre-basemaps@0.0.6/dist/maplibre-basemaps.js"></script>

        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

        <!-- Papa Parse -->
        <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

        <!-- Mapbox Search JS -->
        <script id="search-js" defer="" src="https://api.mapbox.com/search-js/v1.5.0/web.js"></script>

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="map-wrap">
            <div id="map-container"></div>

            <div id="legend">
                <div class="legend-title">SWD Audit Progress</div>
                <div class="legend-table">
                    <div class="legend-row legend-header">
                        <span></span>
                        <span>Status</span>
                        <span>km</span>
                    </div>
                    <div class="legend-row">
                        <span class="legend-line" style="background:#7bff00;"></span>
                        <span>Audit Done</span>
                        <span>80 km</span>
                    </div>
                    <div class="legend-row">
                        <span class="legend-line" style="background:#ff47f0;"></span>
                        <span>Audit In Progress</span>
                        <span>60 km</span>
                    </div>
                </div>
            </div>

            <div id="search-container">
                <mapbox-search-box id="search-box"></mapbox-search-box>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
